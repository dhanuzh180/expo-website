<!DOCTYPE html>
<html>
<head>
<title>Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0f172a;
    color:white;
}

/* HEADER */
.header {
    padding:15px;
    background:#020617;
    text-align:center;
    font-weight:bold;
}

/* CHAT AREA */
#messages {
    height:70vh;
    overflow-y:auto;
    padding:10px;
}

/* MESSAGE */
.msg {
    margin:10px 0;
    padding:10px;
    border-radius:10px;
    max-width:70%;
}

.me {
    background:#2563EB;
    margin-left:auto;
}

.other {
    background:#1e293b;
}

/* INPUT */
.input-box {
    display:flex;
    padding:10px;
    background:#020617;
}

.input-box input {
    flex:1;
    padding:10px;
    border:none;
    border-radius:6px;
}

.input-box button {
    padding:10px;
    margin-left:10px;
    background:#2563EB;
    color:white;
    border:none;
    border-radius:6px;
}
</style>

</head>

<body>

<div class="header">Chat Room</div>

<div id="messages"></div>

<div class="input-box">
<input id="msg" placeholder="Type message...">
<button onclick="sendMsg()">Send</button>
</div>

<script type="module">

// 🔐 LOGIN CHECK
if(!localStorage.getItem("username")){
    window.location="login.html";
}

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBBIn4FGYCn3u2uCrvrcjYkwI6uCzoL7C0",
  authDomain: "problemhub-76fbf.firebaseapp.com",
  projectId: "problemhub-76fbf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const user = localStorage.getItem("username");
const messagesDiv = document.getElementById("messages");

// 🔥 LOAD MESSAGES REAL-TIME
const q = query(collection(db, "messages"), orderBy("time"));

onSnapshot(q, (snapshot) => {
    messagesDiv.innerHTML = "";

    snapshot.forEach(doc => {
        const m = doc.data();

        const className = m.user === user ? "msg me" : "msg other";

        messagesDiv.innerHTML += `
        <div class="${className}">
            <b>${m.user}</b><br>
            ${m.text}
        </div>
        `;
    });

    messagesDiv.scrollTop = messagesDiv.scrollHeight;
});

// 🚀 SEND MESSAGE
window.sendMsg = async function(){

const text = document.getElementById("msg").value;

if(!text) return;

await addDoc(collection(db, "messages"), {
    user: user,
    text: text,
    time: new Date()
});

document.getElementById("msg").value = "";

}

</script>

</body>
</html>
