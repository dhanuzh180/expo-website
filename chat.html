<!DOCTYPE html>
<html>
<body>

<div id="msgs"></div>
<input id="msg">
<button onclick="send()">Send</button>

<script type="module">
import { db } from "./firebase-config.js";
import { collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

onSnapshot(collection(db,"chat"),snap=>{
msgs.innerHTML="";
snap.forEach(d=>{
msgs.innerHTML+=`<p>${d.data().text}</p>`;
});
});

window.send=async()=>{
await addDoc(collection(db,"chat"),{text:msg.value});
}
</script>

</body>
</html>
