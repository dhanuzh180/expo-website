<!DOCTYPE html>
<html>
<head>
<title>ProblemHub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body {
    margin:0;
    font-family: Arial;
    background:#0f172a;
    color:white;
}

/* NAVBAR */
.navbar {
    display:flex;
    justify-content:space-between;
    padding:15px;
    background:#020617;
}

.navbar a {
    color:white;
    margin-left:15px;
    font-size:20px;
}

/* FEED */
#feed {
    max-width:500px;
    margin:auto;
}

/* POST */
.post {
    background:#020617;
    border:1px solid #1e293b;
    border-radius:12px;
    margin:20px;
    overflow:hidden;
}

.post-header {
    display:flex;
    align-items:center;
    padding:10px;
}

.avatar {
    width:40px;
    height:40px;
    border-radius:50%;
    background:#2563EB;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-right:10px;
}

.post img {
    width:100%;
    height:250px;
    object-fit:cover;
}

.post-content {
    padding:10px;
}

</style>

</head>

<body>

<div class="navbar">
<h2>ProblemHub</h2>

<div>
<a href="post.html"><i class="fa-solid fa-plus"></i></a>
<a href="profile.html"><i class="fa-solid fa-user"></i></a>
</div>
</div>

<div id="feed"></div>

<!-- ✅ FIREBASE FULL SETUP -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBBIn4FGYCn3u2uCrvrcjYkwI6uCzoL7C0",
  authDomain: "problemhub-76fbf.firebaseapp.com",
  projectId: "problemhub-76fbf",
  storageBucket: "problemhub-76fbf.firebasestorage.app",
  messagingSenderId: "138908127292",
  appId: "1:138908127292:web:8ee821465df09575eb7339",
  measurementId: "G-R9LEPW3023"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 LOAD POSTS FROM DATABASE
const feed = document.getElementById("feed");

const q = query(collection(db, "posts"), orderBy("created", "desc"));

onSnapshot(q, (snapshot) => {
    feed.innerHTML = "";

    snapshot.forEach((doc) => {
        const p = doc.data();

        feed.innerHTML += `
        <div class="post">

            <div class="post-header">
                <div class="avatar">${p.title?.charAt(0) || "U"}</div>
                <b>${p.title}</b>
            </div>

            <img src="${p.img}">

            <div class="post-content">
                <p><b>Problem:</b> ${p.problem}</p>
                <p><b>Solution:</b> ${p.solution}</p>
            </div>

        </div>
        `;
    });
});

</script>

</body>
</html>
