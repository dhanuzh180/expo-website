<!DOCTYPE html>
<html>
<head>
<title>ProblemHub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body {
    margin:0;
    font-family: Arial;
    background:#0f172a;
    color:white;
}

/* NAVBAR */
.navbar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    background:#020617;
    border-bottom:1px solid #1e293b;
}

.navbar h2 {
    margin:0;
}

.navbar a {
    color:white;
    margin-left:15px;
    font-size:20px;
}

/* FEED */
#feed {
    max-width:500px;
    margin:auto;
}

/* POST CARD */
.post {
    background:#020617;
    border:1px solid #1e293b;
    border-radius:12px;
    margin:20px;
    overflow:hidden;
}

/* HEADER */
.post-header {
    display:flex;
    align-items:center;
    padding:10px;
}

.avatar {
    width:40px;
    height:40px;
    border-radius:50%;
    background:#2563EB;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-right:10px;
    font-weight:bold;
}

/* IMAGE */
.post img {
    width:100%;
    height:250px;
    object-fit:cover;
}

/* CONTENT */
.post-content {
    padding:10px;
}

/* ACTIONS */
.actions {
    display:flex;
    justify-content:space-between;
    padding:10px;
}

.actions i {
    cursor:pointer;
}

/* INPUT */
textarea {
    width:100%;
    padding:10px;
    border:none;
    outline:none;
    background:#0f172a;
    color:white;
}

</style>

</head>

<body>

<div class="navbar">
<h2>ProblemHub</h2>

<div>
<a href="post.html"><i class="fa-solid fa-plus"></i></a>
<a href="search.html"><i class="fa-solid fa-magnifying-glass"></i></a>
<a href="profile.html"><i class="fa-solid fa-user"></i></a>
</div>
</div>

<div id="feed"></div>

<script>

let posts = JSON.parse(localStorage.getItem("posts")) || [];

const feed = document.getElementById("feed");

posts.forEach(p => {

feed.innerHTML += `
<div class="post">

    <div class="post-header">
        <div class="avatar">${p.title.charAt(0)}</div>
        <b>${p.title}</b>
    </div>

    <img src="${p.img}">

    <div class="post-content">
        <p><b>Problem:</b> ${p.problem}</p>
        <p><b>Solution:</b> ${p.solution}</p>
    </div>

    <div class="actions">
        <div>
            <i class="fa-regular fa-heart"></i>
            <i class="fa-regular fa-comment"></i>
            <i class="fa-regular fa-share-from-square"></i>
        </div>
        <i class="fa-regular fa-bookmark"></i>
    </div>

</div>
`;

});

</script>

</body>
</html>
