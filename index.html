<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
<h2>ProblemHub</h2>
<div>
<a href="post.html">+</a>
<a href="chat.html">💬</a>
<a href="profile.html">👤</a>
</div>
</div>

<div id="feed"></div>

<script type="module">
import { db } from "./firebase-config.js";
import { collection, onSnapshot } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const feed=document.getElementById("feed");

onSnapshot(collection(db,"posts"), snap=>{
feed.innerHTML="";
snap.forEach(doc=>{
let p=doc.data();

feed.innerHTML+=`
<div class="card">
<h3>${p.title}</h3>
${p.img?`<img src="${p.img}" width="100%">`:``}
<p>${p.problem}</p>
<p>${p.solution}</p>
</div>
`;
});
});
</script>

</body>
</html>
