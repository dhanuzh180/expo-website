<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login • ProblemHub</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-box { width: 350px; background: var(--ig-bg); border: 1px solid var(--ig-border); padding: 40px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 5px 0; background: #121212; border: 1px solid var(--ig-border); color: white; border-radius: 3px; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1 style="font-family: Arial; margin-bottom: 30px;">ProblemHub</h1>
        <input id="email" type="email" placeholder="Phone number, username, or email">
        <input id="pass" type="password" placeholder="Password">
        <button class="ig-btn" style="width: 100%; margin-top: 15px;" onclick="login()">Log In</button>
        <p style="margin-top: 30px; color: var(--ig-secondary-text);">Don't have an account? <a href="signup.html" style="color: var(--ig-link); text-decoration: none;">Sign up</a></p>
    </div>

    <script type="module">
        import { auth } from './firebase-config.js';
        import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

        window.login = function() {
            const email = document.getElementById("email").value;
            const pass = document.getElementById("pass").value;
            signInWithEmailAndPassword(auth, email, pass)
                .then(() => {
                    localStorage.setItem("username", email.split('@')[0]);
                    window.location="index.html";
                })
                .catch(e => alert("Login Error: " + e.message));
        }
    </script>
</body>
</html>
