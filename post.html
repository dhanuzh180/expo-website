<!DOCTYPE html>
<html>
<body>

<input id="title">
<input type="file" id="file">
<textarea id="problem"></textarea>
<textarea id="solution"></textarea>

<button onclick="addPost()">Post</button>

<script type="module">
import { db, storage } from "./firebase-config.js";
import { collection, addDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
import { ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-storage.js";

window.addPost = async function(){

let file=fileInput.files[0];
let url="";

if(file){
let r=ref(storage,"img/"+file.name);
await uploadBytes(r,file);
url=await getDownloadURL(r);
}

await addDoc(collection(db,"posts"),{
title:title.value,
problem:problem.value,
solution:solution.value,
img:url
});

window.location="index.html";
}
</script>

</body>
</html>
