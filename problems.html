<!DOCTYPE html>
<html>
<head>
<title>Problems</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<style>
img {
    width: 100%;
    border-radius: 10px;
}

/* CATEGORY BUTTONS */
.filters {
    text-align: center;
    margin: 20px;
}

.filters button {
    margin: 5px;
    padding: 10px 15px;
    border: none;
    background: #2563EB;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

.filters button:hover {
    background: #1E40AF;
}
</style>

</head>

<body>

<div class="navbar">
<h2>Expo 2026</h2>
<div>
<a href="index.html">Home</a>
<a href="about.html">About</a>
</div>
</div>

<div class="section-title">Problems by Category</div>

<!-- FILTER BUTTONS -->
<div class="filters">
<button onclick="filterProblems('all')">All</button>
<button onclick="filterProblems('Finance')">Finance</button>
<button onclick="filterProblems('Technology')">Technology</button>
<button onclick="filterProblems('Health')">Health</button>
<button onclick="filterProblems('Education')">Education</button>
</div>

<div class="grid" id="problemContainer"></div>

<script>

const problems = [

{title:"Overspending",category:"Finance",img:"https://images.unsplash.com/photo-1554224155-6726b3ff858f",problem:"Poor expense tracking",solution:"Budget tracking app"},

{title:"Online Fraud",category:"Finance",img:"https://images.unsplash.com/photo-1556740749-887f6717d7e4",problem:"Rising scams",solution:"Fraud detection system"},

{title:"Manual Banking",category:"Finance",img:"https://images.unsplash.com/photo-1565514020179-026b92b2d88d",problem:"Slow banking",solution:"Online banking"},

{title:"Cyber Security",category:"Technology",img:"https://images.unsplash.com/photo-1550751827-4bd374c3f58b",problem:"Data breaches",solution:"Security systems"},

{title:"Fake News",category:"Technology",img:"https://images.unsplash.com/photo-1504711434969-e33886168f5c",problem:"Misinformation",solution:"AI verification"},

{title:"Data Loss",category:"Technology",img:"https://images.unsplash.com/photo-1518779578993-ec3579fee39f",problem:"Lost files",solution:"Cloud backup"},

{title:"Health Monitoring",category:"Health",img:"https://images.unsplash.com/photo-1576091160550-2173dba999ef",problem:"No tracking",solution:"Health app"},

{title:"Mental Health",category:"Health",img:"https://images.unsplash.com/photo-1516302752625-fcc3c50ae61f",problem:"Stress issues",solution:"Wellness app"},

{title:"Fitness Tracking",category:"Health",img:"https://images.unsplash.com/photo-1554284126-aa88f22d8b74",problem:"No fitness tracking",solution:"Fitness app"},

{title:"Lack of Learning",category:"Education",img:"https://images.unsplash.com/photo-1513258496099-48168024aec0",problem:"No resources",solution:"E-learning platform"},

{title:"Student Tracking",category:"Education",img:"https://images.unsplash.com/photo-1523240795612-9a054b0db644",problem:"Attendance issues",solution:"Tracking system"},

{title:"Online Education Issues",category:"Education",img:"https://images.unsplash.com/photo-1584697964403-6c3c1a6f8a3f",problem:"Low engagement",solution:"Interactive learning"}

];

// FUNCTION TO DISPLAY
function displayProblems(list){
const container = document.getElementById("problemContainer");
container.innerHTML = "";

list.forEach(p => {
container.innerHTML += `
<div class="card problem">
<img src="${p.img}">
<h3>${p.title}</h3>
<p><b>Category:</b> ${p.category}</p>
<p><b>Problem:</b> ${p.problem}</p>
<p><b>Solution:</b> ${p.solution}</p>
</div>
`;
});
}

// FILTER FUNCTION
function filterProblems(category){
if(category === "all"){
displayProblems(problems);
}else{
const filtered = problems.filter(p => p.category === category);
displayProblems(filtered);
}
}

// LOAD ALL FIRST
displayProblems(problems);

</script>

</body>
</html>
