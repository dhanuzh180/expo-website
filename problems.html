<!DOCTYPE html>
<html>
<head>
<title>Problems</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<style>
img {
    width: 100%;
    border-radius: 10px;
}

.filters {
    text-align: center;
    margin: 20px;
}

.filters button {
    margin: 5px;
    padding: 10px 15px;
    border: none;
    background: #2563EB;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}
</style>

</head>

<body>

<div class="navbar">
<h2>Expo 2026</h2>
<div>
<a href="index.html">Home</a>
<a href="about.html">About</a>
</div>
</div>

<div class="section-title">Problems by Category</div>

<div class="filters">
<button onclick="filterProblems('all')">All</button>
<button onclick="filterProblems('Finance')">Finance</button>
<button onclick="filterProblems('Technology')">Technology</button>
<button onclick="filterProblems('Health')">Health</button>
<button onclick="filterProblems('Education')">Education</button>
</div>

<div class="grid" id="problemContainer"></div>

<script>

const problems = [

{
title:"Overspending",
category:"Finance",
img:"https://images.unsplash.com/photo-1554224155-6726b3ff858f",
problem:"Many individuals struggle to monitor their daily expenses, leading to poor financial decisions and savings issues.",
solution:"A smart budgeting application can help users gain full control over their financial habits by allowing them to record daily expenses, categorize spending, and analyze patterns over time. The system can provide visual dashboards, alerts for overspending, and personalized financial insights. This not only improves financial awareness but also encourages disciplined saving and better money management in the long term."
},

{
title:"Online Fraud",
category:"Finance",
img:"https://images.unsplash.com/photo-1556740749-887f6717d7e4",
problem:"Online scams and fraud activities are increasing, causing financial loss to users.",
solution:"A fraud detection system can monitor user behavior and transaction patterns to identify suspicious activities in real time. By using algorithms and machine learning concepts, the system can detect unusual transactions and alert users immediately. This helps in preventing financial loss and increases trust in digital platforms by ensuring secure online transactions."
},

{
title:"Manual Banking",
category:"Finance",
img:"https://images.unsplash.com/photo-1565514020179-026b92b2d88d",
problem:"Traditional banking processes are slow and require physical visits.",
solution:"An online banking platform can digitize financial services, allowing users to perform transactions such as fund transfers, bill payments, and account management from anywhere. This reduces waiting time, improves accessibility, and enhances overall user experience. It also minimizes paperwork and increases operational efficiency for banks."
},

{
title:"Cyber Security",
category:"Technology",
img:"https://images.unsplash.com/photo-1550751827-4bd374c3f58b",
problem:"Data breaches and cyber attacks are becoming more frequent.",
solution:"A cybersecurity system can monitor networks and systems continuously to detect threats and vulnerabilities. It uses encryption, authentication, and real-time alerts to prevent unauthorized access. Implementing such systems ensures data protection, maintains privacy, and builds trust among users in digital platforms."
},

{
title:"Fake News",
category:"Technology",
img:"https://images.unsplash.com/photo-1504711434969-e33886168f5c",
problem:"Misinformation spreads rapidly on digital platforms.",
solution:"An AI-based verification system can analyze news content, compare it with trusted sources, and identify misleading information. This system can flag suspicious content and provide users with verified data. It promotes responsible information sharing and reduces the spread of fake news."
},

{
title:"Data Loss",
category:"Technology",
img:"https://images.unsplash.com/photo-1518779578993-ec3579fee39f",
problem:"Users lose important data due to lack of backup systems.",
solution:"A cloud-based backup system allows users to securely store their files online. It automatically saves data and ensures recovery in case of device failure or accidental deletion. This improves data reliability and reduces the risk of permanent data loss."
},

{
title:"Health Monitoring",
category:"Health",
img:"https://images.unsplash.com/photo-1576091160550-2173dba999ef",
problem:"People often ignore regular health tracking.",
solution:"A health monitoring application can track vital parameters such as heart rate, steps, and sleep patterns. It provides reminders for checkups and offers insights into overall health. This helps users maintain a healthier lifestyle and detect potential issues early."
},

{
title:"Mental Health",
category:"Health",
img:"https://images.unsplash.com/photo-1516302752625-fcc3c50ae61f",
problem:"Mental stress and anxiety are increasing among individuals.",
solution:"A mental wellness platform can provide guided meditation, stress management techniques, and counseling support. It can also track mood patterns and suggest improvements. This helps individuals manage stress effectively and maintain emotional well-being."
},

{
title:"Fitness Tracking",
category:"Health",
img:"https://images.unsplash.com/photo-1554284126-aa88f22d8b74",
problem:"People lack motivation to maintain fitness routines.",
solution:"A fitness tracking app can monitor workouts, calories burned, and progress over time. It can set goals and provide reminders, encouraging users to stay consistent. This leads to improved physical health and motivation."
},

{
title:"Lack of Learning",
category:"Education",
img:"https://images.unsplash.com/photo-1513258496099-48168024aec0",
problem:"Students lack access to structured learning resources.",
solution:"An e-learning platform can provide organized courses, video lectures, and quizzes. It allows students to learn at their own pace and improves accessibility to quality education across different regions."
},

{
title:"Student Tracking",
category:"Education",
img:"https://images.unsplash.com/photo-1523240795612-9a054b0db644",
problem:"Tracking student attendance manually is inefficient.",
solution:"A digital tracking system can record attendance automatically and generate reports. It saves time for teachers and ensures accuracy in records."
},

{
title:"Online Education",
category:"Education",
img:"https://images.unsplash.com/photo-1584697964403-6c3c1a6f8a3f",
problem:"Online learning lacks engagement and interaction.",
solution:"Interactive learning systems with quizzes, live sessions, and gamification can improve student engagement and understanding."
}

];

function displayProblems(list){
const container = document.getElementById("problemContainer");
container.innerHTML = "";

list.forEach(p => {
container.innerHTML += `
<div class="card problem">
<img src="${p.img}">
<h3>${p.title}</h3>
<p><b>Category:</b> ${p.category}</p>
<p><b>Problem:</b> ${p.problem}</p>

<a href="solution1.html?title=${encodeURIComponent(p.title)}&img=${encodeURIComponent(p.img)}&category=${encodeURIComponent(p.category)}&problem=${encodeURIComponent(p.problem)}&solution=${encodeURIComponent(p.solution)}">
<button class="btn">View Details</button>
</a>

</div>
`;
});
}

function filterProblems(category){
if(category === "all"){
displayProblems(problems);
}else{
const filtered = problems.filter(p => p.category === category);
displayProblems(filtered);
}
}

displayProblems(problems);

</script>

</body>
</html>
