<!DOCTYPE html>
<html>
<head>
<title>Problems</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<style>
img {
    width: 100%;
    border-radius: 10px;
}

.filters {
    text-align: center;
    margin: 20px;
}

.filters button {
    margin: 5px;
    padding: 10px 15px;
    border: none;
    background: #2563EB;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}
</style>

</head>

<body>

<div class="navbar">
<h2>Expo 2026</h2>
<div>
<a href="index.html">Home</a>
<a href="about.html">About</a>
</div>
</div>

<div class="section-title">Problems by Category</div>

<div class="filters">
<button onclick="filterProblems('all')">All</button>
<button onclick="filterProblems('Finance')">Finance</button>
<button onclick="filterProblems('Technology')">Technology</button>
<button onclick="filterProblems('Health')">Health</button>
<button onclick="filterProblems('Education')">Education</button>
</div>

<div class="grid" id="problemContainer"></div>

<script>

const problems = [
{title:"Overspending",category:"Finance",img:"https://images.unsplash.com/photo-1554224155-6726b3ff858f",problem:"People fail to track expenses properly",solution:"A budgeting app tracks spending and gives alerts"},
{title:"Online Fraud",category:"Finance",img:"https://images.unsplash.com/photo-1556740749-887f6717d7e4",problem:"Increasing online scams",solution:"Fraud detection system using monitoring"},
{title:"Manual Banking",category:"Finance",img:"https://images.unsplash.com/photo-1565514020179-026b92b2d88d",problem:"Slow banking process",solution:"Online banking system"},
{title:"Cyber Security",category:"Technology",img:"https://images.unsplash.com/photo-1550751827-4bd374c3f58b",problem:"Data breaches",solution:"Security tools detect threats"},
{title:"Fake News",category:"Technology",img:"https://images.unsplash.com/photo-1504711434969-e33886168f5c",problem:"Misinformation spread",solution:"AI verifies content"},
{title:"Data Loss",category:"Technology",img:"https://images.unsplash.com/photo-1518779578993-ec3579fee39f",problem:"Loss of important files",solution:"Cloud backup system"},
{title:"Health Monitoring",category:"Health",img:"https://images.unsplash.com/photo-1576091160550-2173dba999ef",problem:"No health tracking",solution:"Health app with reminders"},
{title:"Mental Health",category:"Health",img:"https://images.unsplash.com/photo-1516302752625-fcc3c50ae61f",problem:"Stress issues",solution:"Mental wellness app"},
{title:"Fitness Tracking",category:"Health",img:"https://images.unsplash.com/photo-1554284126-aa88f22d8b74",problem:"No fitness discipline",solution:"Fitness tracking app"},
{title:"Lack of Learning",category:"Education",img:"https://images.unsplash.com/photo-1513258496099-48168024aec0",problem:"No access to resources",solution:"E-learning platform"},
{title:"Student Tracking",category:"Education",img:"https://images.unsplash.com/photo-1523240795612-9a054b0db644",problem:"Attendance issues",solution:"Tracking system"},
{title:"Online Education",category:"Education",img:"https://images.unsplash.com/photo-1584697964403-6c3c1a6f8a3f",problem:"Low engagement",solution:"Interactive tools"}
];

function displayProblems(list){
const container = document.getElementById("problemContainer");
container.innerHTML = "";

list.forEach(p => {
container.innerHTML += `
<div class="card problem">
<img src="${p.img}">
<h3>${p.title}</h3>
<p><b>Category:</b> ${p.category}</p>
<p><b>Problem:</b> ${p.problem}</p>

<a href="solution1.html?title=${encodeURIComponent(p.title)}&img=${encodeURIComponent(p.img)}&category=${encodeURIComponent(p.category)}&problem=${encodeURIComponent(p.problem)}&solution=${encodeURIComponent(p.solution)}">
<button class="btn">View Details</button>
</a>

</div>
`;
});
}

function filterProblems(category){
if(category === "all"){
displayProblems(problems);
}else{
const filtered = problems.filter(p => p.category === category);
displayProblems(filtered);
}
}

displayProblems(problems);

</script>

</body>
</html>
