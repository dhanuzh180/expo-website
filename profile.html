<!DOCTYPE html>
<html>
<head>
<title>Profile</title>
<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
}

.avatar{
width:100px;
height:100px;
border-radius:50%;
background:#2563EB;
margin:20px auto;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
}
</style>
</head>

<body>

<div class="avatar" id="avatar"></div>
<h2 id="name"></h2>

<script>
const user = localStorage.getItem("username") || "Guest";

document.getElementById("name").innerText = user;
document.getElementById("avatar").innerText = user.charAt(0);
</script>

</body>
</html>
