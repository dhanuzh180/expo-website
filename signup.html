<!DOCTYPE html>
<html>
<head>
<title>Signup</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">

<button onclick="signup()">Signup</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBBIn4FGYCn3u2uCrvrcjYkwI6uCzoL7C0",
  authDomain: "problemhub-76fbf.firebaseapp.com",
  projectId: "problemhub-76fbf",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.signup = function(){
const email = email.value;
const pass = pass.value;

createUserWithEmailAndPassword(auth, email, pass)
.then(()=>{
alert("Account created");
window.location="login.html";
})
.catch(e=>alert(e.message));
}

</script>

</body>
</html>
